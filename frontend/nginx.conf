# Ailexity POS - Nginx Configuration
# Save this to: /etc/nginx/sites-available/ailexity

server {
    listen 80;
    server_name ailexity.in www.ailexity.in;

    # Root directory for frontend static files
    # This is the ONLY location where frontend should be served from
    root /var/www/ailexity.in/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Frontend - Serve static files with SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        
        # Cache control for static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # No cache for HTML (to get updates immediately)
        location ~ \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # Backend API - Reverse proxy to FastAPI
    location /api/ {
        # Remove /api prefix and forward to backend
        rewrite ^/api/(.*) /$1 break;
        
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # Required headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # Optional: Direct access to specific backend endpoints
    # (useful if frontend needs to access /token without /api prefix)
    location = /token {
        proxy_pass http://127.0.0.1:8000/token;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }

    # Logs
    access_log /var/log/nginx/ailexity-access.log;
    error_log /var/log/nginx/ailexity-error.log;
}

# Optional: Redirect www to non-www (or vice versa)
